h1{

}

.container{
max-width:900px;

.card{
background:white;
border-radius:14px;
padding:15px;
margin-bottom:25px;

.slider{
display:flex;
overflow-x:auto;
gap:10px;

.slider img{
width:260px;
height:180px;
object-fit:cover;
border-radius:8px;
flex-shrink:0;
}

.name{
font-size:20px;
font-weight:bold;

}

.price{
color:#ff4d4d;
font-weight:bold;
margin-bottom:10px;
}

.desc{
margin-bottom:10px;
line-height:1.5;
}

.buttons a{
display:inline-block;
padding:8px 14px;
margin-right:8px;
background:#4CAF50;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
}

.map{
background:#2196F3 !important;
}

</style>
